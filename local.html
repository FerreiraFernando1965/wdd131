<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WDD 131 – Cidade de Campinas - SP - Brasil</title>
    <meta name="description" content="Álbum do Templo de Campinas -SP- Brasil.">
    <meta name="author" content="Fernando Luis Ferreira">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos/local.css">
    <script src="scripts/local.js" defer></script>
</head>

<body>
    
    <header>
        <p>Cidade de Campinas - SP - Brasil</p>
    </header> 

    <main>
        <figure>
            <picture>            
            <source media="(max-width: 699px)" srcset="imagens/Templo de Campinas-pequeno.webp">
            <img src="imagens/Templo de Campinas.webp" alt="Templo de Campinas SP Brasil">
        </picture>
            <figcaption>Campinas SP Brasil</figcaption>
        </figure>

        <div class="container-section">
            <section class="card-clima">
                <h2 class="titulo-clima">
                    <svg class="icone-mobile" viewBox="0 0 24  24" width="48" height="48">
                       <!-- Sol atrás da nuvem -->
                       <circle cx="8" cy="8" r="3.5" fill="#FFC107" />
                       <path d="M8 2.5v1.5M8 12v1.5M2.5 8H4M12 8h1.5M4.1 4.1l1.1 1.1M10.8 10.8l1.1 1.1M4.1 11.9l1.1-1.1M10.8 5.2l1.1-1.1" stroke="#FF9800" stroke-width="1.5" stroke-linecap="round"/>
    
                       <!-- Nuvem -->
                       <path d="M7 16a3.5 3.5 0 0 1-.5-6.96A4.5 4.5 0 0 1 15 10a3.5 3.5 0 0 1 1 6.86H7z" fill="#90CAF9" stroke="#42A5F5" stroke-width="1" stroke-linejoin="round"/>
    
                       <!-- Gotas de chuva -->
                       <path d="M8.5 18.5l-1 2.5M12 18.5l-1 2.5M15.5 18.5l-1 2.5" stroke="#29B6F6" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>

                    Clima
                </h2>
                <ul class="clima">
                    <li><strong>Temperatura:</strong> <span id="temp">8</span>°C</li>
                    <li><strong>Condição:</strong> Ensolarado</li>
                    <li><strong>Vento:</strong> <span id="vento">12</span> km/h</li>
                    <li><strong>Sensação Térmica:</strong> <span id="sensacao"></span></li>
                </ul>
            </section>
   
            <section class="card-dados">
                <h2>Dados da Cidade</h2>
                <ul class="dados">
                    <li><strong>População:</strong> 1.1 milhão</li>
                    <li><strong>Fundação:</strong> 14 de Julho de 1774</li>
                    <li><strong>Altitude:</strong> 685 metros</li>
                    <li><strong>Estado:</strong> São Paulo</li>
                </ul>
            </section>
        </div>  
    </main>

    <footer>
        <p>&copy; <span id="anoatual"></span> 🚀 Fernando Luis Ferreira   SP - Brasil 🚀 </p>
        <p id="ultimaModificacao"></p>
    </footer>

</body>
</html>
