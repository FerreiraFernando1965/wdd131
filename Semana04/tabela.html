<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela em HTML</title>
    <link rel="stylesheet" href="estilos/tabela.css">
</head>
<body>
    <h1>Exemplo de tabela HTML</h1>
<table  Summary="tabela criada parte da atividade de aprendizagem da Semana 04" width="100%"  border="1"   style="text-align: center;">
	<caption>Tabela 1: ⚕️ Dados de Vendas Distritais</caption>
	<thead>
		<tr>
			<th colspan="2" scope="colgroup">Vendas Médicas</th>
		</tr>
		<tr>
			<th scope="col">Mês</th>
			<th scope="col">Quantia</th>
		</tr>
	</thead>
	<tbody>
		<tr>
			<td>Julho</td>
			<td>3.000</td>
		</tr>
		<tr>
			<td>Agosto</td>
			<td class="highlight">8.000</td>
		</tr>
		<tr>
			<td>Setembro</td>
			<td>4.000</td>
		</tr>
		<tr>
			<td>Outubro</td>
			<td>3.000</td>
		</tr>
		<tr>
			<td>Novembro</td>
			<td>2.000</td>
		</tr>
	</tbody>
</table>
    
</body>
</html>
